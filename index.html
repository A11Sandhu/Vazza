<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Vazza — Visuals &amp; Events</title>
<link rel="icon" type="image/png" href="assets/images/favicon.png">
<link rel="stylesheet" href="assets/css/style.css">
<style>
  .landing {
    height: 100vh;
    min-height: 480px;
    flex-direction: row;
  }
  .landing-brand {
    position: absolute;
    top: 36px;
    left: 50%;
    transform: translateX(-50%);
    z-index: 5;
    text-align: center;
  }
  .landing-brand-mark {
    font-size: 26px;
    letter-spacing: 0.5em;
    color: var(--ink-soft);
    font-weight: 500;
    transform: translateX(4px);
  }
  .landing-brand-rule {
    margin-top: 8px;
    width: 34px;
    height: 1px;
    background: linear-gradient(90deg, transparent, var(--accent-line), transparent);
    margin-left: auto;
    margin-right: auto;
  }
  .landing-half {
    flex: 1 1 50%;
    width: 50%;
    max-width: 50%;
    position: relative;
    display: flex;
    align-items: center;
    justify-content: center;
    text-decoration: none;
    cursor: pointer;
    overflow: hidden;
    box-sizing: border-box;
    transition: filter .5s ease, background .5s ease;
  }
  .landing-half:hover { filter: brightness(1.03); }
  #half-visuals { background: linear-gradient(135deg, #f6f3ec 0%, #ece6d8 55%, #e2dac7 100%); }
  #half-visuals:hover { background: #ffffff; }
  #half-events { background: linear-gradient(225deg, #f6f3ec 0%, #ece6d8 55%, #e2dac7 100%); }
  #half-events:hover { background: #ffffff; }
  .landing-logo-bg {
    position: absolute;
    inset: 0;
    background-size: 92%;
    background-position: center 30%;
    background-repeat: no-repeat;
    opacity: 0;
    transition: opacity .6s ease;
    pointer-events: none;
    filter: grayscale(1) contrast(1.1);
  }
  .landing-half:hover .landing-logo-bg { opacity: 0.16; }
  #half-visuals .landing-logo-bg { background-image: url('assets/images/vazza-visuals-figurines.png'); }
  #half-events .landing-logo-bg { background-image: url('assets/images/vazza-events-figurines.png'); }
  .landing-overlay {
    position: absolute;
    inset: 0;
    opacity: 0.5;
    transition: opacity .5s ease;
    pointer-events: none;
  }
  .landing-half:hover .landing-overlay { opacity: 1; }
  #half-visuals .landing-overlay { background: radial-gradient(circle at 30% 20%, rgba(255,255,255,0.5), transparent 60%); }
  #half-events .landing-overlay { background: radial-gradient(circle at 70% 20%, rgba(255,255,255,0.5), transparent 60%); }
  .landing-content {
    position: relative;
    z-index: 2;
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 22px;
    animation: fadeUp 1s ease both .15s;
    opacity: 0;
  }
  #half-events .landing-content { animation-delay: .3s; }
  .landing-label-wrap { text-align: center; }
  .landing-label {
    display: inline-block;
    max-width: 90%;
    box-sizing: border-box;
    font-size: 34px;
    letter-spacing: 0.28em;
    color: var(--ink);
    font-weight: 500;
    padding: 10px 22px;
    border-radius: 2px;
    cursor: pointer;
    border: 1px solid transparent;
    transition: border-color .4s ease, font-size .35s ease, letter-spacing .35s ease;
  }
  .landing-label:hover {
    font-size: 20px;
    letter-spacing: 0.18em;
    border-color: var(--accent-line);
  }
  .landing-label .label-hover { display: none; }
  .landing-label:hover .label-default { display: none; }
  .landing-label:hover .label-hover { display: inline; }
  .landing-sub {
    margin-top: 12px;
    font-size: 12px;
    letter-spacing: 0.22em;
    color: var(--muted-2);
    font-style: italic;
  }
  .landing-line {
    width: 26px;
    height: 1px;
    background: var(--muted-3);
    transition: width .4s ease;
  }
  .landing-label:hover ~ .landing-line,
  .landing-label-wrap:hover + .landing-line {
    width: 46px;
  }
  .landing-divider {
    position: absolute;
    top: 0;
    left: 50%;
    transform: translateX(-50%);
    width: 1px;
    height: 100%;
    background: linear-gradient(180deg, transparent, var(--border) 15%, var(--border) 85%, transparent);
    z-index: 4;
  }
  .landing-select {
    position: absolute;
    top: 50%;
    left: 50%;
    transform: translate(-50%, -50%);
    z-index: 6;
    width: 64px;
    height: 64px;
    border-radius: 50%;
    background: var(--bg-ivory);
    border: 1px solid #cfc4ab;
    display: flex;
    align-items: center;
    justify-content: center;
    box-shadow: 0 4px 18px rgba(90,80,60,0.12);
    font-size: 11px;
    letter-spacing: 0.15em;
    color: #9b8f78;
  }
  .landing-footer-links {
    position: absolute;
    bottom: 60px;
    left: 50%;
    transform: translateX(-50%);
    z-index: 5;
    font-size: 13px;
    letter-spacing: 0.2em;
    color: var(--muted-3);
    display: flex;
    align-items: center;
    gap: 14px;
    white-space: nowrap;
  }
  .landing-footer-links a {
    color: #111111;
    text-decoration: none;
    transition: color .3s ease;
  }
  .landing-footer-links a:hover { color: var(--ink); text-decoration: underline; }
  .landing-footer-links a.ig-icon:hover { text-decoration: none; }
  .landing-footer-location {
    position: absolute;
    bottom: 32px;
    left: 50%;
    transform: translateX(-50%);
    z-index: 5;
    font-size: 13px;
    letter-spacing: 0.06em;
    color: var(--ink);
    font-style: italic;
    white-space: nowrap;
  }
  @media (max-width: 700px) {
    .landing { flex-direction: column !important; height: auto !important; min-height: 100vh !important; overflow: visible !important; align-items: stretch; }
    .landing-half { width: 100% !important; max-width: 100% !important; min-height: 300px !important; padding: 40px 20px !important; }
    .landing-divider { width: 100% !important; height: 1px !important; top: 50% !important; left: 0 !important; transform: translateY(-50%) !important; }
    .landing-brand { top: 18px !important; }
    .landing-footer-links { position: static !important; transform: none !important; margin: 22px auto 0 !important; padding: 0 16px !important; flex-wrap: wrap !important; justify-content: center !important; gap: 12px !important; font-size: 12px !important; }
    .landing-footer-location { position: static !important; transform: none !important; margin: 14px auto 28px !important; padding: 0 20px !important; text-align: center !important; white-space: normal !important; }
  }
</style>
</head>
<body>

<div class="page landing">

  <div class="landing-brand fade-in">
    <div class="landing-brand-mark">VAZZA</div>
    <div class="landing-brand-rule"></div>
  </div>

  <a href="visuals.html" class="landing-half" id="half-visuals">
    <div class="landing-logo-bg"></div>
    <div class="landing-overlay"></div>
    <div class="landing-content">
      <div class="landing-label-wrap">
        <div class="landing-label"><span class="label-default">VISUALS</span><span class="label-hover">ENTER VAZZA VISUALS</span></div>
        <div class="landing-sub">Photography, Capturing Memories</div>
      </div>
      <div class="landing-line"></div>
    </div>
  </a>

  <div class="landing-divider"></div>
  <div class="landing-select">SELECT</div>

  <a href="events.html" class="landing-half" id="half-events">
    <div class="landing-logo-bg"></div>
    <div class="landing-overlay"></div>
    <div class="landing-content">
      <div class="landing-label-wrap">
        <div class="landing-label"><span class="label-default">EVENTS</span><span class="label-hover">ENTER VAZZA EVENTS</span></div>
        <div class="landing-sub">Weddings &amp; Celebrations</div>
      </div>
      <div class="landing-line"></div>
    </div>
  </a>

  <div class="landing-footer-links">
    <a href="https://www.instagram.com/vazzavisuals/" target="_blank" rel="noopener">VAZZA VISUALS</a>
    <a href="https://instagram.com/vazza" target="_blank" rel="noopener" class="ig-icon" style="display:flex; align-items:center; justify-content:center;">
      <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.6">
        <rect x="2" y="2" width="20" height="20" rx="5"></rect>
        <circle cx="12" cy="12" r="4.2"></circle>
        <circle cx="17.3" cy="6.7" r="0.9" fill="currentColor" stroke="none"></circle>
      </svg>
    </a>
    <a href="https://www.instagram.com/vazzaevents/" target="_blank" rel="noopener">VAZZA EVENTS</a>
  </div>
  <div class="landing-footer-location">
    Based in Vancouver, BC — Serving Punjabi, South Asian &amp; Luxury Weddings
  </div>
</div>

</body>
</html>
